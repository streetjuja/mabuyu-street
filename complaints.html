<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews & Complaints — Mabuyu Street</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- DRAWER OVERLAY -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- SIDE DRAWER -->
<div class="side-drawer" id="sideDrawer">
  <div class="drawer-header">
  
  </div>
  <nav class="drawer-nav">
    <div class="drawer-section">Menu</div>
    <a href="index.html" class="active"><span class="drawer-icon">🏠</span> Home</a>
    <a href="track.html"><span class="drawer-icon">📦</span> Track Order</a>
    <a href="contact.html"><span class="drawer-icon">📍</span> Contact & Location</a>
    <a href="complaints.html"><span class="drawer-icon">💬</span> Reviews</a>
  </nav>
</div>

<nav>
  <button class="hamburger" id="hamburger" onclick="toggleDrawer()">
    <span></span>
    <span></span>
    <span></span>
  </button>
<div class="logo" style="position:absolute; left:50%; transform:translateX(-50%);">🌴 Mabuyu Street</div>
  <div class="cart-icon" onclick="toggleCart()">
    🛒 <span id="cart-count">0</span>
  </div>
</nav>
<div class="form-section">
  <div class="form-card">
    <h2>💬 Share Your Experience</h2>

    <div class="form-group">
      <label>Your Name (optional)</label>
      <input type="text" id="name" placeholder="e.g. Amina">
    </div>

    <div class="form-group">
      <label>Type of Feedback</label>
      <select id="type">
        <option value="">-- Select --</option>
        <option value="review">⭐ Review / Praise</option>
        <option value="suggestion">💡 Suggestion</option>
        <option value="complaint">⚠️ Complaint</option>
      </select>
    </div>

    <div class="form-group">
      <label>Rate Us</label>
      <div class="star-rating" id="stars">
        <span class="star" data-val="1">★</span>
        <span class="star" data-val="2">★</span>
        <span class="star" data-val="3">★</span>
        <span class="star" data-val="4">★</span>
        <span class="star" data-val="5">★</span>
      </div>
    </div>

    <div class="form-group">
      <label>Your Message</label>
      <textarea id="message" rows="5" placeholder="Tell us what you think..."></textarea>
    </div>

    <button class="submit-btn" onclick="submitForm()">Send Feedback 🚀</button>
    <div class="success-msg" id="success">
      ✅ Thank you! Your feedback has been received. We appreciate you!
    </div>
  </div>
</div>

<footer>
  &copy; 2026 Mabuyu Street &mdash; Along Gatundu Road, Opposite Nderich Wines
</footer>
<script>
function toggleMenu() {
  document.getElementById('hamburger').classList.toggle('open');
  document.getElementById('navMenu').classList.toggle('open');
}
// Close menu when a link is clicked
document.querySelectorAll('#navMenu a').forEach(link => {
  link.addEventListener('click', () => {
    document.getElementById('hamburger').classList.remove('open');
    document.getElementById('navMenu').classList.remove('open');
  });
});
</script>
<script>
function toggleDrawer() {
  document.getElementById('hamburger').classList.toggle('open');
  document.getElementById('sideDrawer').classList.toggle('open');
  document.getElementById('drawerOverlay').classList.toggle('open');
}
function closeDrawer() {
  document.getElementById('hamburger').classList.remove('open');
  document.getElementById('sideDrawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}
</script>
<script src="script.js"></script>
</body>
</html>
